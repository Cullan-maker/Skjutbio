<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Simulator v0.9 - Ljud & Fil-fix</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; cursor: none; }
        :fullscreen, ::backdrop { background-color: #000; }
        .video-container { position: relative; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; }
        video.active { display: block; }
        
        /* Start-skärm */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 300; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; padding: 20px; text-align: center;
        }
        button, select { padding: 15px; font-size: 18px; margin: 10px; width: 280px; border-radius: 8px; border: none; }
        .start-btn { background: #e74c3c; color: white; font-weight: bold; }

        /* Sikte */
        #sight-group {
            position: absolute; z-index: 50; top: 50%; left: 50%;
            transform: translate(-50%, -50%); display: none; pointer-events: none;
        }
        .rear-sight { position: absolute; width: 80px; height: 40px; background: #111; left: -40px; top: 0; }
        .rear-sight-notch { position: absolute; width: 20px; height: 25px; left: 50%; bottom: 0; transform: translateX(-50%); box-shadow: inset 0 0 0 100px #000; }
        .front-sight { position: absolute; width: 16px; height: 45px; background: #222; left: -8px; bottom: 0; }
        .front-sight-dot { position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%; top: 5px; left: 4px; }

        /* Ljudmätare (VU) under spel */
        #audio-debug {
            position: absolute; top: 10px; left: 10px; width: 150px; height: 20px;
            background: rgba(255,255,255,0.2); z-index: 400; border-radius: 10px; overflow: hidden; display: none;
        }
        #vu-bar { width: 0%; height: 100%; background: lime; transition: width 0.05s; }

        /* Kontroller */
        #controls { position: absolute; bottom: 10px; right: 10px; z-index: 100; display: none; }
        #flash { position: absolute; width: 100%; height: 100%; background: #fff; opacity: 0; z-index: 200; pointer-events: none; }
        #debug-log { position: absolute; top: 35px; left: 10px; color: lime; font-size: 10px; z-index: 400; pointer-events: none; }
    </style>
</head>
<body>

<div id="version-tag" style="position:absolute; bottom:5px; left:5px; color:#444; font-size:10px; z-index:500;">v0.9</div>

<div id="audio-debug"><div id="vu-bar"></div></div>
<div id="debug-log"></div>

<div id="overlay">
    <h2>GLOCK AR SIMULATOR</h2>
    <p>Scenario-val</p>
    <select id="levelSelect">
        <option value="office">Scenario: Kontoret</option>
        <option value="burglar">Scenario: Inbrottet</option>
    </select>
    <button class="start-btn" onclick="initSimulator()">STARTA SIMULATOR</button>
</div>

<div id="controls">
    <button onclick="calibrate()" style="background: #333; color: white; padding: 10px;">KALIBRERA</button>
</div>

<div id="flash"></div>

<div id="sight-group">
    <div class="rear-sight"><div class="rear-sight-notch"></div></div>
    <div class="front-sight"><div class="front-sight-dot"></div></div>
</div>

<div class="video-container">
    <video id="videoThreat" class="active" loop muted playsinline preload="auto"></video>
    <video id="videoFall" muted playsinline preload="auto"></video>
    <div id="target-man" style="position:absolute; width:20%; height:50%; top:25%; left:40%; z-index:10;"></div>
</div>

<script>
    // =========================================================================
    // ⚙️ FILNAMN FRÅN GEMINI - KONTROLLERA ATT DESSA STÄMMER PÅ GITHUB
    // =========================================================================
    const FILER = {
        office_hot: "1000033793.mp4",
        office_fall: "1000033792.mp4",
        burglar_hot: "gemini_generated_video_d513bdd2.mp4",
        burglar_fall: "1000033813.mp4"
    };
    // =========================================================================

    const vThreat = document.getElementById('videoThreat');
    const vFall = document.getElementById('videoFall');
    const sight = document.getElementById('sight-group');
    const vuBar = document.getElementById('vu-bar');
    const logElem = document.getElementById('debug-log');

    function writeLog(msg) { logElem.innerText = msg; }

    const scenarios = {
        office: { t: FILER.office_hot, f: FILER.office_fall, s: 4.0 },
        burglar: { t: FILER.burglar_hot, f: FILER.burglar_fall, s: 0.0 }
    };

    let hasShot = false;
    let offset = { x: 0, y: 0 };
    let curGyro = { x: 0, y: 0 };
    let audioCtx;

    async function initSimulator() {
        // Helskärm
        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();

        // Ladda scenario
        const sc = scenarios[document.getElementById('levelSelect').value];
        vThreat.src = sc.t;
        vFall.src = sc.f;
        vThreat.load(); vFall.load();
        
        vThreat.play().catch(e => writeLog("Video-fel! Kolla filnamn på GitHub."));

        // Gyro
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            const resp = await DeviceOrientationEvent.requestPermission();
            if (resp === 'granted') window.addEventListener('deviceorientation', e => { curGyro.x = e.gamma; curGyro.y = e.beta; updateSight(); });
        } else {
            window.addEventListener('deviceorientation', e => { curGyro.x = e.gamma; curGyro.y = e.beta; updateSight(); });
        }

        // Mikrofon & VU-mätare
        startAudio();

        document.getElementById('overlay').style.display = 'none';
        document.getElementById('controls').style.display = 'block';
        document.getElementById('audio-debug').style.display = 'block';
        sight.style.display = 'block';
    }

    function startAudio() {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const src = audioCtx.createMediaStreamSource(stream);
            const ana = audioCtx.createAnalyser();
            ana.fftSize = 256;
            src.connect(ana);
            const data = new Uint8Array(ana.frequencyBinCount);
            
            const check = () => {
                if (hasShot) return;
                ana.getByteFrequencyData(data);
                let vol = Math.max(...data);
                
                // Uppdatera mätaren så du ser om den hör dig
                vuBar.style.width = (vol / 255) * 100 + "%";

                // Om ljudet är högre än 70 (sänkt från 120 för bättre respons)
                if (vol > 70) fire();
                requestAnimationFrame(check);
            };
            check();
        });
    }

    function updateSight() {
        if (hasShot) return;
        let x = (window.innerWidth / 2) + (curGyro.x - offset.x) * 15;
        let y = (window.innerHeight / 2) + (curGyro.y - offset.y) * 15;
        sight.style.left = x + 'px';
        sight.style.top = y + 'px';
        window.lastPos = { x, y };
    }

    function calibrate() {
        offset.x = curGyro.x;
        offset.y = curGyro.y;
        if(audioCtx) audioCtx.resume(); // Säkerställ att ljudet är igång
    }

    function fire() {
        if (hasShot) return;
        hasShot = true;
        
        document.getElementById('flash').style.opacity = 1;
        setTimeout(() => document.getElementById('flash').style.opacity = 0, 50);

        const target = document.getElementById('target-man').getBoundingClientRect();
        const p = window.lastPos || { x: window.innerWidth/2, y: window.innerHeight/2 };

        if (p.x > target.left && p.x < target.right && p.y > target.top && p.y < target.bottom) {
            vThreat.pause();
            vFall.classList.add('active');
            vFall.currentTime = scenarios[document.getElementById('levelSelect').value].s;
            vFall.play();
        } else {
            setTimeout(() => { hasShot = false; }, 1000);
        }
    }
</script>
</body>
</html>

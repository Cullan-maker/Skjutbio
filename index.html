<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Simulator v0.7 - Mobile Fix</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .video-container { position: relative; width: 100%; height: 100%; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; }
        video.active { display: block; }

        /* Start-skärm */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 300; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; padding: 20px;
        }
        button, select { padding: 15px; font-size: 18px; margin: 10px; width: 280px; border-radius: 8px; border: none; }
        .start-btn { background: #e74c3c; color: white; font-weight: bold; }

        /* Sikte */
        #sight-group {
            position: absolute; z-index: 50; top: 50%; left: 50%;
            transform: translate(-50%, -50%); display: none; pointer-events: none;
        }
        .rear-sight { position: absolute; width: 80px; height: 40px; background: #111; left: -40px; top: 0; }
        .rear-sight-notch { 
            position: absolute; width: 20px; height: 25px; left: 50%; bottom: 0;
            transform: translateX(-50%); box-shadow: inset 0 0 0 100px #000;
        }
        .front-sight { position: absolute; width: 16px; height: 45px; background: #222; left: -8px; bottom: 0; }
        .front-sight-dot { position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%; top: 5px; left: 4px; }

        /* Logg för felsökning på mobil */
        #debug-log {
            position: absolute; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.5);
            color: lime; font-size: 10px; z-index: 400; pointer-events: none; padding: 5px;
        }
        #controls { position: absolute; bottom: 10px; right: 10px; z-index: 100; display: none; }
        #flash { position: absolute; width: 100%; height: 100%; background: #fff; opacity: 0; z-index: 200; pointer-events: none; }
    </style>
</head>
<body>

<div id="debug-log">Log: Väntar på start...</div>
<div id="version-tag" style="position:absolute; bottom:5px; left:5px; color:#444; font-size:10px; z-index:500;">v0.7</div>

<div id="overlay">
    <h2>GLOCK AR SIMULATOR</h2>
    <p>Håll mobilen i Landskapsläge</p>
    <select id="levelSelect">
        <option value="office">Scenario: Kontoret</option>
        <option value="burglar">Scenario: Inbrottet</option>
    </select>
    <button class="start-btn" onclick="initSimulator()">STARTA & TILLÅT SENSORER</button>
</div>

<div id="controls">
    <button onclick="calibrate()" style="width: auto; font-size: 12px; background: #333; color: white;">KALIBRERA</button>
</div>

<div id="flash"></div>

<div id="sight-group">
    <div class="rear-sight"><div class="rear-sight-notch"></div></div>
    <div class="front-sight"><div class="front-sight-dot"></div></div>
</div>

<div class="video-container">
    <video id="videoThreat" class="active" loop muted playsinline preload="auto"></video>
    <video id="videoFall" muted playsinline preload="auto"></video>
    <div id="target-man" style="position:absolute; width:20%; height:50%; top:25%; left:40%; z-index:10;"></div>
</div>

<script>
    const log = (msg) => { document.getElementById('debug-log').innerText += "\n> " + msg; };
    const vThreat = document.getElementById('videoThreat');
    const vFall = document.getElementById('videoFall');
    const sight = document.getElementById('sight-group');
    
    const scenarios = {
        office: { t: "1000033793.mp4", f: "1000033792.mp4", s: 4.0 },
        burglar: { t: "gemini_generated_video_d513bdd2.mp4", f: "1000033813.mp4", s: 0.0 }
    };

    let hasShot = false;
    let offset = { x: 0, y: 0 };
    let curGyro = { x: 0, y: 0 };

    async function initSimulator() {
        log("Initierar...");
        
        // 1. Fullscreen
        try {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            else if (document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();
            log("Fullscreen OK");
        } catch(e) { log("FS Fel: " + e.message); }

        // 2. Video
        const sc = scenarios[document.getElementById('levelSelect').value];
        vThreat.src = sc.t;
        vFall.src = sc.f;
        vThreat.load();
        vFall.load();
        
        vThreat.play().then(() => log("Video spelar")).catch(e => log("Video Fel: " + e.message));

        // 3. Gyro-tillåtelse (Kritisk för iOS)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response === 'granted') {
                    window.addEventListener('deviceorientation', (e) => {
                        curGyro.x = e.gamma; curGyro.y = e.beta;
                        updateSight();
                    });
                    log("Gyro OK (iOS)");
                }
            } catch (e) { log("Gyro Fel: " + e.message); }
        } else {
            window.addEventListener('deviceorientation', (e) => {
                curGyro.x = e.gamma; curGyro.y = e.beta;
                updateSight();
            });
            log("Gyro OK (Android/PC)");
        }

        // 4. Mikrofon
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            log("Mic OK");
            const ctx = new AudioContext();
            const src = ctx.createMediaStreamSource(stream);
            const ana = ctx.createAnalyser();
            src.connect(ana);
            const data = new Uint8Array(ana.frequencyBinCount);
            const check = () => {
                if (hasShot) return;
                ana.getByteFrequencyData(data);
                if (Math.max(...data) > 120) fire();
                requestAnimationFrame(check);
            };
            check();
        }).catch(e => log("Mic Fel: " + e.message));

        document.getElementById('overlay').style.display = 'none';
        document.getElementById('controls').style.display = 'block';
        sight.style.display = 'block';
    }

    function updateSight() {
        if (hasShot) return;
        let x = (window.innerWidth / 2) + (curGyro.x - offset.x) * 15;
        let y = (window.innerHeight / 2) + (curGyro.y - offset.y) * 15;
        sight.style.left = x + 'px';
        sight.style.top = y + 'px';
        window.lastPos = { x, y };
    }

    function calibrate() {
        offset.x = curGyro.x;
        offset.y = curGyro.y;
        log("Kalibrerad");
    }

    function fire() {
        if (hasShot) return;
        hasShot = true;
        log("SKOTT!");
        
        document.getElementById('flash').style.opacity = 1;
        setTimeout(() => document.getElementById('flash').style.opacity = 0, 50);

        const target = document.getElementById('target-man').getBoundingClientRect();
        const p = window.lastPos || { x: window.innerWidth/2, y: window.innerHeight/2 };

        if (p.x > target.left && p.x < target.right && p.y > target.top && p.y < target.bottom) {
            vThreat.pause();
            vFall.classList.add('active');
            vFall.currentTime = scenarios[document.getElementById('levelSelect').value].s;
            vFall.play();
            log("TRÄFF");
        } else {
            log("BOM");
            setTimeout(() => { hasShot = false; log("Ladda om..."); }, 1000);
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Skjutsimulator - Helskärm</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif;
        }
        /* Fix för mobil helskärm - tvingar allt att hålla sig inom skärmen */
        :fullscreen, ::backdrop {
            background-color: #000;
        }
        .video-container { position: relative; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: cover; display: none; }
        video.active { display: block; }
        
        /* Start-skärm */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px;
        }
        button, select {
            padding: 10px 20px; font-size: 16px; cursor: pointer;
            background: #e74c3c; color: white; border: none; border-radius: 5px;
            margin-top: 10px; width: 100%;
        }
        select { background: #333; }

        /* Kontrollpanel */
        #controls {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.7); color: white; padding: 15px;
            border-radius: 8px; z-index: 100; font-size: 14px;
            width: 200px;
        }

        /* Sikte - Glock 45 */
        #sight-group {
            position: absolute; pointer-events: none; z-index: 50;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: none;
        }
        .rear-sight {
            position: absolute; width: 100px; height: 50px;
            background-color: #111; top: 0; left: -50px;
        }
        .rear-sight-notch {
            position: absolute; width: 26px; height: 30px;
            background-color: transparent; bottom: 0; left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 10px 0 10px transparent, inset 0 0 0 100px #000;
        }
        .rear-sight-notch::before {
            content: ''; position: absolute; width: 30px; height: 32px;
            border: 4px solid #eee; border-top: none;
            bottom: -4px; left: 50%; transform: translateX(-50%);
            border-radius: 0 0 5px 5px;
        }
        .front-sight {
            position: absolute; width: 20px; height: 55px;
            background-color: #1a1a1a; bottom: 0; left: -10px;
        }
        .front-sight-dot {
            position: absolute; width: 10px; height: 10px;
            background-color: #eee; border-radius: 50%;
            top: 8px; left: 50%; transform: translateX(-50%);
        }

        /* Mål */
        #target-man {
            position: absolute; width: 25%; height: 60%;
            top: 20%; left: 37.5%; z-index: 5;
        }

        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; opacity: 0; pointer-events: none;
            z-index: 60;
        }
        
        #status {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); color: white; font-size: 20px;
            z-index: 100; text-shadow: 2px 2px 4px black;
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1>Glock Simulator AR</h1>
    <p>1. Håll telefonen vågrätt (Landscape)<br>2. Rikta pistolen framåt</p>
    <button onclick="initSimulator()">STARTA SIMULATOR I HELSKÄRM</button>
</div>

<div id="controls">
    <label>Välj bana:</label>
    <select id="levelSelect" onchange="changeLevel()">
        <option value="office">Bana 1: Kontoret</option>
        <option value="burglar">Bana 2: Inbrottet</option>
    </select>
    <hr style="border-color: #555;">
    Trigger (Mic): <input type="range" id="threshold" min="0" max="255" value="120" style="width: 100%;"><br>
    <button onclick="calibrate()">KALIBRERA SIKTE</button>
</div>

<div id="sight-group">
    <div class="rear-sight"><div class="rear-sight-notch"></div></div>
    <div class="front-sight"><div class="front-sight-dot"></div></div>
</div>

<div id="flash"></div>
<div id="status">Väntar på start...</div>

<div class="video-container" id="videoContainer">
    <video id="videoThreat" class="active" loop muted playsinline preload="auto">
        <source src="1000033793.mp4" type="video/mp4">
    </video>
    <video id="videoFall" playsinline preload="auto">
        <source src="1000033792.mp4" type="video/mp4">
    </video>
    <div id="target-man"></div>
</div>

<script>
    const vThreat = document.getElementById('videoThreat');
    const vFall = document.getElementById('videoFall');
    const sight = document.getElementById('sight-group');
    const status = document.getElementById('status');
    const flash = document.getElementById('flash');
    const threshold = document.getElementById('threshold');
    const levelSelect = document.getElementById('levelSelect');
    
    // Konfiguration för banorna
    const levels = {
        office: {
            threatVideo: "1000033793.mp4",
            fallVideo: "1000033792.mp4",
            fallStartTime: 4.0
        },
        burglar: {
            threatVideo: "gemini_generated_video_d513bdd2.mp4",
            fallVideo: "1000033813.mp4",
            fallStartTime: 0.0
        }
    };
    
    let currentLevel = levels.office;
    let hasShot = false;
    let gyro = { alpha: 0, beta: 0, gamma: 0 };
    let offset = { x: 0, y: 0 };
    let sensitivity = 15;

    // NY FUNKTION: Helskärmsläge
    function openFullscreen() {
        const elem = document.documentElement; // Väljer hela HTML-dokumentet
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { /* Safari */
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) { /* IE11 */
            elem.msRequestFullscreen();
        }
    }

    // Funktion för att byta bana
    function changeLevel() {
        const selected = levelSelect.value;
        currentLevel = levels[selected];
        
        vThreat.src = currentLevel.threatVideo;
        vFall.src = currentLevel.fallVideo;
        
        resetGame();
    }

    function resetGame() {
        hasShot = false;
        vThreat.classList.add('active');
        vFall.classList.remove('active');
        
        // Tvinga webbläsaren att ladda om filmerna vid banbyte
        vThreat.load();
        vFall.load();
        
        // Fånga eventuella fel om mobilen försöker blockera auto-play
        vThreat.play().catch(e => console.log("Spelar upp video manuellt:", e));
        
        status.innerText = "Sikta och skjut!";
        status.style.color = "white";
    }

    async function initSimulator() {
        // Aktivera helskärm direkt vid klick
        openFullscreen();
        
        document.getElementById('overlay').style.display = 'none';
        
        // Sätt rätt bana och tvinga igång filmen omedelbart efter knapptryck
        changeLevel(); 
        vThreat.play();
        
        sight.style.display = 'block';

        startAudio();

        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission === 'granted') {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
        }
    }

    function handleOrientation(event) {
        gyro.x = event.gamma; 
        gyro.y = event.beta; 
        updateSight();
    }

    function calibrate() {
        offset.x = gyro.x;
        offset.y = gyro.y;
        status.innerText = "Sikte nollställt!";
        setTimeout(() => { if(!hasShot) status.innerText = "Sikta och skjut!"; }, 1500);
    }

    function updateSight() {
        if (hasShot) return;

        let dx = (gyro.x - offset.x) * sensitivity;
        let dy = (gyro.y - offset.y) * sensitivity;

        let posX = (window.innerWidth / 2) + dx;
        let posY = (window.innerHeight / 2) + dy;

        sight.style.left = posX + 'px';
        sight.style.top = posY + 'px';

        window.currentPos = { x: posX, y: posY };
    }

    function fire() {
        if (hasShot) return;

        flash.style.opacity = 1;
        setTimeout(() => flash.style.opacity = 0, 50);

        const target = document.getElementById('target-man').getBoundingClientRect();
        const p = window.currentPos || {x: window.innerWidth/2, y: window.innerHeight/2};

        if (p.x > target.left && p.x < target.right && p.y > target.top && p.y < target.bottom) {
            hasShot = true;
            vThreat.classList.remove('active');
            vThreat.pause();
            
            vFall.classList.add('active');
            vFall.currentTime = currentLevel.fallStartTime; 
            vFall.play();
            
            status.innerText = "TRÄFF! Välj bana för att spela igen.";
            status.style.color = "lime";
        } else {
            status.innerText = "BOM!";
            status.style.color = "red";
            setTimeout(() => { if(!hasShot) { status.style.color = "white"; status.innerText = "Sikta igen!"; } }, 1000);
        }
    }

    function startAudio() {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            const ctx = new AudioContext();
            const src = ctx.createMediaStreamSource(stream);
            const ana = ctx.createAnalyser();
            src.connect(ana);
            const data = new Uint8Array(ana.frequencyBinCount);
            function loop() {
                ana.getByteFrequencyData(data);
                let vol = Math.max(...data);
                if (vol > threshold.value) fire();
                requestAnimationFrame(loop);
            }
            loop();
        });
    }
</script>

</body>
</html>

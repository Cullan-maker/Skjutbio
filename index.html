<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Simulator v1.2 - Landscape & Audio Fix</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; cursor: none; }
        :fullscreen, ::backdrop { background-color: #000; }
        .video-container { position: relative; width: 100%; height: 100%; z-index: 1; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; }
        video.active { display: block; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 300; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; padding: 20px; text-align: center;
        }
        button, select { padding: 15px; font-size: 18px; margin: 10px; width: 280px; border-radius: 8px; border: none; font-weight: bold; }
        .start-btn { background: #e74c3c; color: white; }

        /* Sikte */
        #sight-group {
            position: absolute; z-index: 50; top: 50%; left: 50%;
            transform: translate(-50%, -50%); display: none; pointer-events: none;
        }
        .rear-sight { position: absolute; width: 80px; height: 40px; background: #111; left: -40px; top: 0; }
        .rear-sight-notch { position: absolute; width: 20px; height: 25px; left: 50%; bottom: 0; transform: translateX(-50%); box-shadow: inset 0 0 0 100px #000; }
        .front-sight { position: absolute; width: 16px; height: 45px; background: #222; left: -8px; bottom: 0; }
        .front-sight-dot { position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%; top: 5px; left: 4px; }

        /* Debug Panel */
        #debug-panel {
            position: absolute; top: 10px; left: 10px; width: 220px;
            background: rgba(0,0,0,0.85); z-index: 400; padding: 10px; border-radius: 10px; color: lime; font-size: 11px; pointer-events: none;
        }
        #vu-meter { width: 100%; height: 12px; background: #333; border-radius: 6px; margin: 5px 0; overflow: hidden; }
        #vu-bar { width: 0%; height: 100%; background: lime; }

        /* Kontroller */
        #controls { position: absolute; bottom: 10px; right: 10px; z-index: 100; display: none; display: flex; flex-direction: column; }
        .ctrl-btn { width: 150px; padding: 10px; font-size: 12px; background: #333; color: white; margin-top: 5px; cursor: pointer; }
        
        #flash { position: absolute; width: 100%; height: 100%; background: #fff; opacity: 0; z-index: 200; pointer-events: none; }
    </style>
</head>
<body>

<div id="debug-panel">
    <div style="font-weight:bold; margin-bottom:5px;">AR SIM v1.2</div>
    Ljudnivå (Pang!):
    <div id="vu-meter"><div id="vu-bar"></div></div>
    <div id="status-log">Väntar på start...</div>
</div>

<div id="overlay">
    <h2>GLOCK AR SIMULATOR</h2>
    <p>Håll mobilen LIGGANDE innan du startar</p>
    <select id="levelSelect">
        <option value="office">Scenario: Kontoret</option>
        <option value="burglar">Scenario: Inbrottet</option>
    </select>
    <button class="start-btn" onclick="initSimulator()">STARTA SIMULATOR</button>
</div>

<div id="controls" id="gameControls">
    <button class="ctrl-btn" onclick="calibrate()">KALIBRERA SIKTE</button>
    <button class="ctrl-btn" onclick="goBack()" style="background:#c0392b;">TILLBAKA TILL MENY</button>
</div>

<div id="flash"></div>

<div id="sight-group">
    <div class="rear-sight"><div class="rear-sight-notch"></div></div>
    <div class="front-sight"><div class="front-sight-dot"></div></div>
</div>

<div class="video-container">
    <video id="videoThreat" class="active" loop muted playsinline preload="auto"></video>
    <video id="videoFall" muted playsinline preload="auto"></video>
    <div id="target-man" style="position:absolute; width:25%; height:60%; top:20%; left:37.5%; z-index:10;"></div>
</div>

<script>
    // FILNAMN FRÅN GEMINI
    const FILER = {
        office_hot: "gemini_generated_video_0d52a464.mp4",
        office_fall: "gemini_generated_video_160ee669.mp4",
        burglar_hot: "gemini_generated_video_d513bdd2.mp4",
        burglar_fall: "gemini_generated_video_4086abb1.mp4"
    };

    const vThreat = document.getElementById('videoThreat');
    const vFall = document.getElementById('videoFall');
    const sight = document.getElementById('sight-group');
    const vuBar = document.getElementById('vu-bar');
    const statusLog = document.getElementById('status-log');
    const controls = document.getElementById('controls');

    const scenarios = {
        office: { t: FILER.office_hot, f: FILER.office_fall, s: 4.0 },
        burglar: { t: FILER.burglar_hot, f: FILER.burglar_fall, s: 0.0 }
    };

    let hasShot = false;
    let offset = { x: 0, y: 0 };
    let curGyro = { beta: 0, gamma: 0 };
    let audioCtx, analyser, dataArray;
    let sensitivity = 20; // Lite högre för bättre känsla
    let peakVol = 0;

    async function initSimulator() {
        try {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        } catch(e) {}

        const sc = scenarios[document.getElementById('levelSelect').value];
        vThreat.src = sc.t;
        vFall.src = sc.f;
        vThreat.load(); vFall.load();
        
        vThreat.play().catch(() => statusLog.innerText = "FEL: Kunde inte ladda video.");

        // Gyro-begäran
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            const resp = await DeviceOrientationEvent.requestPermission();
            if (resp === 'granted') window.addEventListener('deviceorientation', handleGyro);
        } else {
            window.addEventListener('deviceorientation', handleGyro);
        }

        setupAudio();
        document.getElementById('overlay').style.display = 'none';
        controls.style.display = 'flex';
        sight.style.display = 'block';
    }

    function handleGyro(e) {
        // I LANDSKAPSLÄGE: 
        // Beta styr horisontellt (vridning på pistolen sida till sida)
        // Gamma styr vertikalt (vinkling upp och ner)
        curGyro.x = e.beta; 
        curGyro.y = e.gamma; 
        updateSight();
    }

    function updateSight() {
        if (hasShot) return;
        
        // Logik för liggande läge (Landscape)
        // Vi använder beta för X och gamma för Y
        let dx = (curGyro.x - offset.x) * sensitivity;
        let dy = (curGyro.y - offset.y) * sensitivity;

        let posX = (window.innerWidth / 2) + dx;
        let posY = (window.innerHeight / 2) + dy;

        sight.style.left = posX + 'px';
        sight.style.top = posY + 'px';
        window.lastPos = { x: posX, y: posY };
    }

    function calibrate() {
        offset.x = curGyro.x;
        offset.y = curGyro.y;
        if(audioCtx) audioCtx.resume();
        statusLog.innerText = "Sikte nollställt!";
    }

    function goBack() {
        hasShot = false;
        vThreat.pause();
        vFall.pause();
        vFall.classList.remove('active');
        sight.style.display = 'none';
        controls.style.display = 'none';
        document.getElementById('overlay').style.display = 'flex';
        statusLog.innerText = "Tillbaka i menyn.";
        if(audioCtx) audioCtx.close();
        audioCtx = null;
    }

    function setupAudio() {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const src = audioCtx.createMediaStreamSource(stream);
            analyser.fftSize = 256;
            src.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            const check = () => {
                if (!audioCtx || hasShot) return;
                analyser.getByteFrequencyData(dataArray);
                let vol = Math.max(...dataArray);
                
                // VU-Mätare
                vuBar.style.width = (vol / 255) * 100 + "%";
                if (vol > peakVol) peakVol = vol;
                statusLog.innerText = "Topp-volym: " + peakVol;

                // Mycket lägre threshold (50) för att fånga upp "pang"
                if (vol > 55) fire(); 
                requestAnimationFrame(check);
            };
            check();
        }).catch(() => statusLog.innerText = "Mic-fel: Kolla behörighet.");
    }

    function fire() {
        if (hasShot) return;
        hasShot = true;
        
        document.getElementById('flash').style.opacity = 1;
        setTimeout(() => document.getElementById('flash').style.opacity = 0, 50);

        const target = document.getElementById('target-man').getBoundingClientRect();
        const p = window.lastPos || { x: window.innerWidth/2, y: window.innerHeight/2 };

        if (p.x > target.left && p.x < target.right && p.y > target.top && p.y < target.bottom) {
            vThreat.pause();
            vFall.classList.add('active');
            vFall.currentTime = scenarios[document.getElementById('levelSelect').value].s;
            vFall.play();
            statusLog.innerText = "TRÄFF!";
        } else {
            statusLog.innerText = "BOM! Skjut igen...";
            setTimeout(() => { hasShot = false; peakVol = 0; }, 1000);
        }
    }
</script>
</body>
</html>
